# Azure Pipeline for Playwright Tests
# Runs only on schedule (weekdays at 5 AM Malaysia Time)

trigger: none  # Don't run on code push

schedules:
- cron: "0 21 * * 1-5"  # Run weekdays (Mon-Fri) at 5 AM Malaysia Time (MYT/UTC+8)
  displayName: Weekday Test Run (5 AM MYT, Mon-Fri)
  branches:
    include:
    - master
  always: true

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Test
  displayName: 'Run Playwright Tests'
  jobs:
  - job: PlaywrightTests
    displayName: 'Playwright Test Execution'
    timeoutInMinutes: 90
    steps:
    - checkout: self
      displayName: 'Checkout Repository'

    - script: |
        echo "Current directory: $(pwd)"
        echo "Git commit: $(git rev-parse HEAD)"
      displayName: 'Debug: Verify Checkout'

    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '18.x'

    - task: DownloadSecureFile@1
      displayName: 'Download credentials (.env)'
      name: envFile
      inputs:
        secureFile: 'playwright.env'

    - script: |
        cp $(envFile.secureFilePath) .env
        echo "✅ Credentials loaded from Secure File"
        # Show which email will be used (not the password)
        TEST_USERNAME=$(grep "^TEST_USERNAME=" .env | cut -d'=' -f2)
        echo "TEST_USERNAME: $TEST_USERNAME"
      displayName: 'Load Credentials'

    - script: |
        echo "Installing dependencies..."
        npm ci --prefer-offline
      displayName: 'Install Dependencies'

    - script: |
        echo "Installing Playwright browsers..."
        npx playwright install --with-deps chromium
      displayName: 'Install Playwright Browsers'

    - script: |
        echo "Running Playwright tests..."
        npx playwright test || true
      displayName: 'Run All Tests'
      env:
        CI: true
      continueOnError: true

    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'test-results.xml'
        failTaskOnFailedTests: false
        testRunTitle: 'Playwright Test Results'

    - task: PublishPipelineArtifact@1
      displayName: 'Upload HTML Report'
      condition: eq(variables['System.JobAttempt'], '1')
      inputs:
        targetPath: 'playwright-report'
        artifact: 'playwright-report'
        publishLocation: 'pipeline'

    - task: PublishPipelineArtifact@1
      displayName: 'Upload JSON Results'
      condition: eq(variables['System.JobAttempt'], '1')
      inputs:
        targetPath: 'test-results.json'
        artifact: 'test-results-json'
        publishLocation: 'pipeline'

    - task: PublishPipelineArtifact@1
      displayName: 'Upload Screenshots/Videos'
      condition: eq(variables['System.JobAttempt'], '1')
      inputs:
        targetPath: 'test-results'
        artifact: 'test-results-media'
        publishLocation: 'pipeline'

    - script: |
        echo "======================================"
        echo "📧 SENDING EMAIL REPORT"
        echo "======================================"

        # Load credentials from .env
        set -a; source .env; set +a

        if [ -z "$EMAIL_USER" ] || [ -z "$EMAIL_PASSWORD" ] || [ -z "$EMAIL_RECIPIENTS" ]; then
          echo "⏭️ Email secrets not configured - skipping email notification"
          echo "📥 Download test report from Artifacts section"
          exit 0
        fi

        echo "Installing nodemailer..."
        npm install nodemailer

        echo "Sending email report..."
        node scripts/send-email-report.js || {
          echo "⚠️ Email sending failed"
          echo "📥 Download test report from Artifacts instead"
          exit 0
        }

        echo "✅ Email sent successfully!"
      displayName: 'Send Email Report'
      condition: always()
      continueOnError: true

    - script: |
        echo "======================================"
        echo "📊 TEST SUMMARY"
        echo "======================================"

        if [ -f test-results.json ]; then
          node scripts/generate-summary.js
        else
          echo "No test results found"
        fi
      displayName: 'Generate Test Summary'
      condition: always()
