# Azure Pipeline for Playwright Tests
# Runs ALL test cases (76+ tests) on schedule (weekdays at 5 AM Malaysia Time)
# Expected runtime: 30-40 minutes
#
# CREDENTIALS: Update tests/.env file and push to change login credentials.
# Current test account: see .env file (TEST_USERNAME / TEST_PASSWORD)

trigger: none  # Don't run on code push

schedules:
- cron: "0 21 * * 1-5"  # Run weekdays (Mon-Fri) at 5 AM Malaysia Time (MYT/UTC+8)
  displayName: Weekday Full Test Suite (5 AM MYT, Mon-Fri)
  branches:
    include:
    - master
  always: true

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Test
  displayName: 'Run Playwright Tests'
  jobs:
  - job: PlaywrightTests
    displayName: 'Playwright Test Execution'
    timeoutInMinutes: 90
    steps:
    - checkout: self
      displayName: 'Checkout Repository'

    - script: |
        echo "Git commit: $(git rev-parse HEAD)"
        # Show which account will be used for tests
        TEST_USERNAME=$(grep "^TEST_USERNAME=" .env | cut -d'=' -f2)
        echo "Test account: $TEST_USERNAME"
      displayName: 'Show Test Account'

    - task: NodeTool@0
      displayName: 'Install Node.js'
      inputs:
        versionSpec: '18.x'

    - script: |
        echo "Installing dependencies..."
        npm ci --prefer-offline
      displayName: 'Install Dependencies'

    - script: |
        echo "Installing Playwright browsers..."
        npx playwright install --with-deps chromium
      displayName: 'Install Playwright Browsers'

    - script: |
        echo "Running Playwright tests..."
        echo "Running ALL test suites (76+ test files)"
        echo "Expected runtime: 30-40 minutes"
        npx playwright test || true
      displayName: 'Run All Test Cases'
      env:
        CI: true
      continueOnError: true

    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'test-results.xml'
        failTaskOnFailedTests: false
        testRunTitle: 'Playwright Test Results'

    - task: PublishPipelineArtifact@1
      displayName: 'Upload HTML Report'
      condition: eq(variables['System.JobAttempt'], '1')
      inputs:
        targetPath: 'playwright-report'
        artifact: 'playwright-report'
        publishLocation: 'pipeline'

    - task: PublishPipelineArtifact@1
      displayName: 'Upload JSON Results'
      condition: eq(variables['System.JobAttempt'], '1')
      inputs:
        targetPath: 'test-results.json'
        artifact: 'test-results-json'
        publishLocation: 'pipeline'

    - task: PublishPipelineArtifact@1
      displayName: 'Upload Screenshots/Videos'
      condition: eq(variables['System.JobAttempt'], '1')
      inputs:
        targetPath: 'test-results'
        artifact: 'test-results-media'
        publishLocation: 'pipeline'

    - script: |
        echo "======================================"
        echo "📧 SENDING EMAIL REPORT"
        echo "======================================"

        # Load credentials from .env
        set -a; source .env; set +a

        if [ -z "$EMAIL_USER" ] || [ -z "$EMAIL_PASSWORD" ] || [ -z "$EMAIL_RECIPIENTS" ]; then
          echo "⏭️ Email not configured in .env - skipping"
          exit 0
        fi

        npm install nodemailer
        node scripts/send-email-report.js || {
          echo "⚠️ Email sending failed - download report from Artifacts"
          exit 0
        }

        echo "✅ Email sent!"
      displayName: 'Send Email Report'
      condition: always()
      continueOnError: true

    - script: |
        echo "======================================"
        echo "📊 TEST SUMMARY"
        echo "======================================"

        if [ -f test-results.json ]; then
          node scripts/generate-summary.js
        else
          echo "No test results found"
        fi
      displayName: 'Generate Test Summary'
      condition: always()
